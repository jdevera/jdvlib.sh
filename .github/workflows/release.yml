name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  TERM: linux

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Build
        run: make build
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/jdvlib.sh
            build/jdvlib-*.sh
