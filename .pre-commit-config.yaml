repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: run-tests
        name: run tests
        language: system
        entry: make test
        stages: [pre-push]
        always_run: true
        pass_filenames: false
      - id: readme-up-to-date
        name: readme up to date
        language: script
        entry: ./compile.sh readme
        files: ^(lib/.*\.sh|compile\.sh)$
        pass_filenames: false
  - repo: https://github.com/jdevera/shdoc-ng
    rev: v0.5.0
    hooks:
      - id: shdoc-ng-check
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: shellcheck (library)
        args: ["--check-sourced"]
        files: ^lib/lib\.sh$
      - id: shellcheck
        name: shellcheck (non-library)
        files: \.(sh|bash|bats)$
        exclude: ^lib/
